# Build static dashboard for GitHub Pages (browser reads live Supabase data).
# Live URL: https://sumitchhabra01.github.io/ACGS/
#
# Requires repo secrets: SUPABASE_URL, SUPABASE_ANON_KEY (and migration 0003_public_read).
# Cron workflows write to Supabase; visitors refresh the page to see new data.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Static export cannot include middleware or API route handlers.
      - name: Prepare static export
        working-directory: apps/dashboard
        run: |
          if [ -f src/middleware.ts ]; then mv src/middleware.ts ../../.pages-stash-middleware.ts; fi
          if [ -d src/app/api ]; then mv src/app/api ../../.pages-stash-api; fi
          for f in src/app/page.tsx src/app/content/page.tsx src/app/analytics/page.tsx; do
            sed -i 's/export const dynamic = "force-dynamic"/export const dynamic = "force-static"/' "$f"
          done

      - name: Build static site
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_GITHUB_PAGES: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build --workspace apps/dashboard

      - name: Add .nojekyll
        run: touch apps/dashboard/out/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/dashboard/out

      - id: deployment
        uses: actions/deploy-pages@v4
