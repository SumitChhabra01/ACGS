# Trends → content drafts every 12 hours → Supabase content_items (pending_approval).
# Requires ANTHROPIC_API_KEY for real drafts; mock output is NOT saved to the pipeline.

name: Agents — Content (every 12h)

on:
  schedule:
    - cron: "30 */12 * * *" # every 12h at :30 UTC
  workflow_dispatch:

concurrency:
  group: agents-content
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  content:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/requirements.txt

      - name: Verify secrets
        run: |
          missing=""
          [ -z "${{ secrets.SUPABASE_URL }}" ] && missing="$missing SUPABASE_URL"
          [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ] && missing="$missing SUPABASE_SERVICE_ROLE_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Add these GitHub repository secrets:$missing"
            exit 1
          fi
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set — no real drafts will be saved (mock-only run)."
          fi

      - run: pip install -r requirements.txt

      - name: Generate content drafts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAND_NICHE: ${{ secrets.BRAND_NICHE }}
          LLM_PROVIDER: ""
        run: python run.py content
